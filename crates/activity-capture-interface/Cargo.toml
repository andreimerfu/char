tokio = { workspace = true, features = ["sync"] }
tokio-stream = { workspace = true }
url = { workspace = true }

[build-dependencies]
schemars = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
specta = { workspace = true, features = ["derive"] }
