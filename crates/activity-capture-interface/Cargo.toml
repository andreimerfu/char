[package]
name = "activity-capture-interface"
version = "0.1.0"
edition = "2024"

[features]
specta = ["dep:specta"]

[dependencies]
base64 = { workspace = true }
futures-core = { workspace = true }
schemars = { workspace = true }
serde = { workspace = true, features = ["derive"] }
specta = { workspace = true, optional = true, features = ["derive"] }
