on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        type: choice
        options:
          - nightly
          - stable
      publish:
        description: "Publish to Crabnebula and create GitHub release"
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.channel }}
  cancel-in-progress: true

env:
  DESKTOP_RELEASE_PLATFORMS: '["macos-aarch64","macos-x86_64"]'

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/desktop_build.yaml
    with:
      channel: ${{ inputs.channel }}
      platforms: ${{ env.DESKTOP_RELEASE_PLATFORMS }}
    secrets: inherit
  release:
    needs: build
    uses: ./.github/workflows/desktop_release.yaml
    with:
      channel: ${{ inputs.channel }}
      version: ${{ needs.build.outputs.version }}
      publish: ${{ inputs.publish }}
      platforms: ${{ env.DESKTOP_RELEASE_PLATFORMS }}
    secrets: inherit
