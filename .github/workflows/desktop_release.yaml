on:
  workflow_call:
    inputs:
      channel:
        required: true
        type: string
      version:
        required: true
        type: string
      publish:
        required: false
        type: boolean
        default: true
      platforms:
        required: true
        type: string # JSON array, e.g. '["macos-aarch64","macos-x86_64"]'

env:
  CN_APPLICATION: "fastrepl/hyprnote2"
  RELEASE_CHANNEL: ${{ inputs.channel }}

jobs:
  draft-upload-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/version.sh "./apps/desktop/src-tauri/tauri.conf.json" "${{ inputs.version }}"
      - uses: ./.github/actions/cn_release
        with:
          cmd: draft
          app: ${{ env.CN_APPLICATION }}
          key: ${{ secrets.CN_API_KEY }}
          channel: ${{ env.RELEASE_CHANNEL }}
          framework: tauri
          working-directory: ./apps/desktop
      - uses: actions/download-artifact@v4
        with:
          pattern: desktop-release-*
          path: .
          merge-multiple: true
      - run: |
          shopt -s nullglob
          ARCHIVES=(desktop-release-*.tar)
          if [[ "${#ARCHIVES[@]}" -eq 0 ]]; then
            echo "::error::No desktop release archives were downloaded"
            exit 1
          fi

          for archive in "${ARCHIVES[@]}"; do
            tar -xf "$archive"
          done

          mapfile -t REQUIRED_PLATFORMS < <(jq -r '.[]' <<< '${{ inputs.platforms }}')
          if [[ "${#REQUIRED_PLATFORMS[@]}" -eq 0 ]]; then
            echo "::error::No desktop platforms were provided"
            exit 1
          fi

          for platform in "${REQUIRED_PLATFORMS[@]}"; do
            case "$platform" in
              macos-aarch64)
                TARGET="aarch64-apple-darwin"
                ;;
              macos-x86_64)
                TARGET="x86_64-apple-darwin"
                ;;
              *)
                echo "::error::Unsupported desktop release platform: $platform"
                exit 1
                ;;
            esac

            BUNDLE_DIR="apps/desktop/src-tauri/target/${TARGET}/release/bundle/dmg"
            if [[ ! -d "$BUNDLE_DIR" ]]; then
              echo "::error::Missing restored bundle directory for $TARGET at $BUNDLE_DIR"
              exit 1
            fi

            if ! find "$BUNDLE_DIR" -maxdepth 1 -type f -name '*.dmg' | grep -q .; then
              echo "::error::Missing DMG asset for $TARGET in $BUNDLE_DIR"
              exit 1
            fi

            if ! find "apps/desktop/src-tauri/target/${TARGET}/release" -maxdepth 1 -type f -name '*.sig' | grep -q .; then
              echo "::error::Missing signature for $TARGET in apps/desktop/src-tauri/target/${TARGET}/release"
              exit 1
            fi
          done
      - uses: ./.github/actions/cn_release
        with:
          cmd: upload
          app: ${{ env.CN_APPLICATION }}
          key: ${{ secrets.CN_API_KEY }}
          channel: ${{ env.RELEASE_CHANNEL }}
          framework: tauri
          working-directory: ./apps/desktop
      - uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: desktop_v${{ inputs.version }}
          tag_prefix: ""

  publish-release:
    if: ${{ inputs.publish }}
    needs: draft-upload-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - run: git fetch --tags --force
      - uses: ./.github/actions/cn_release
        with:
          cmd: publish
          app: ${{ env.CN_APPLICATION }}
          key: ${{ secrets.CN_API_KEY }}
          channel: ${{ env.RELEASE_CHANNEL }}
          framework: tauri
          working-directory: ./apps/desktop
      - id: download-macos-aarch64
        if: ${{ contains(inputs.platforms, 'macos-aarch64') }}
        uses: ./.github/actions/cn_download
        with:
          app: ${{ env.CN_APPLICATION }}
          version: ${{ inputs.version }}
          channel: ${{ env.RELEASE_CHANNEL }}
          platform: dmg-aarch64
          output: hyprnote-macos-aarch64.dmg
          key: ${{ secrets.CN_API_KEY }}
      - id: download-macos-x86_64
        if: ${{ contains(inputs.platforms, 'macos-x86_64') }}
        uses: ./.github/actions/cn_download
        with:
          app: ${{ env.CN_APPLICATION }}
          version: ${{ inputs.version }}
          channel: ${{ env.RELEASE_CHANNEL }}
          platform: dmg-x86_64
          output: hyprnote-macos-x86_64.dmg
          key: ${{ secrets.CN_API_KEY }}
      - id: release-artifacts
        run: |
          FILES=()
          if [[ -f hyprnote-macos-aarch64.dmg ]]; then
            FILES+=("hyprnote-macos-aarch64.dmg")
          fi
          if [[ -f hyprnote-macos-x86_64.dmg ]]; then
            FILES+=("hyprnote-macos-x86_64.dmg")
          fi

          if [[ "${#FILES[@]}" -eq 0 ]]; then
            echo "::error::No desktop release assets were downloaded"
            exit 1
          fi

          {
            echo "checksum_inputs<<EOF"
            printf '%s\n' "${FILES[@]}"
            echo "EOF"
            echo "artifacts=$(IFS=,; echo "${FILES[*]}")"
          } >> "$GITHUB_OUTPUT"
      - id: checksums
        uses: ./.github/actions/generate_checksums
        with:
          files: ${{ steps.release-artifacts.outputs.checksum_inputs }}
      - id: artifacts
        env:
          DOWNLOADED_FILES: ${{ steps.release-artifacts.outputs.artifacts }}
          CHECKSUM_FILES: ${{ steps.checksums.outputs.checksum_files }}
        run: |
          ARTIFACTS="$DOWNLOADED_FILES"
          if [[ -n "$CHECKSUM_FILES" ]]; then
            ARTIFACTS="$ARTIFACTS,$CHECKSUM_FILES"
          fi
          echo "list=$ARTIFACTS" >> "$GITHUB_OUTPUT"
      - id: release-body
        env:
          CHANNEL: ${{ inputs.channel }}
          VERSION: ${{ inputs.version }}
        run: |
          if [[ "$CHANNEL" != "nightly" ]]; then
            echo "value=https://char.com/changelog/$VERSION" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CURRENT_TAG="desktop_v$VERSION"
          PREV_TAG=""
          LAST_TAG=""
          LAST_NIGHTLY_TAG=""

          while IFS= read -r tag; do
            if [[ "$tag" == "$CURRENT_TAG" ]]; then
              PREV_TAG="$LAST_NIGHTLY_TAG"
              if [[ -z "$PREV_TAG" ]]; then
                PREV_TAG="$LAST_TAG"
              fi
              break
            fi

            if [[ "$tag" == *"-nightly."* ]]; then
              LAST_NIGHTLY_TAG="$tag"
            fi

            LAST_TAG="$tag"
          done < <(git tag -l 'desktop_v*' --sort=v:refname)

          if [[ -n "$PREV_TAG" ]]; then
            echo "value=https://github.com/${{ github.repository }}/compare/$PREV_TAG...$CURRENT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "value=https://github.com/${{ github.repository }}/commits/${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi
      - uses: ncipollo/release-action@v1
        with:
          tag: desktop_v${{ inputs.version }}
          name: desktop_v${{ inputs.version }}
          body: ${{ steps.release-body.outputs.value }}
          prerelease: ${{ inputs.channel == 'nightly' }}
          makeLatest: ${{ inputs.channel == 'nightly' && 'false' || 'true' }}
          artifacts: ${{ steps.artifacts.outputs.list }}
