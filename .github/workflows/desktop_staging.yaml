on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform"
        required: true
        type: choice
        options:
          - macos-aarch64
          - windows-x64
          - windows-arm64
      request_id:
        description: "Unique request id for this staging dispatch"
        required: false
        type: string

run-name: Desktop Staging (${{ inputs.platform }})${{ inputs.request_id != '' && format(' [{0}]', inputs.request_id) || '' }}

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.platform }}
  cancel-in-progress: true

jobs:
  run:
    uses: ./.github/workflows/desktop_build.yaml
    with:
      channel: staging
      platforms: '["${{ inputs.platform }}"]'
    secrets: inherit
