name: claw_cd

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: depot-ubuntu-24.04-4
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - run: |
          {
            echo 'PACKAGE_DESCRIPTION<<README_EOF'
            cat apps/claw/README.md
            echo README_EOF
          } >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/claw/Dockerfile
          push: true
          tags: ghcr.io/fastrepl/char-claw:${{ github.sha }}
          annotations: |
            index:org.opencontainers.image.description=${{ env.PACKAGE_DESCRIPTION }}
            index:org.opencontainers.image.source=https://github.com/fastrepl/char
          cache-from: type=gha
          cache-to: type=gha,mode=max
